<script id="cabw-final-mobile-plotly-resize">
(function(){
  function resizePlots(){
    if(!window.Plotly) return;
    document.querySelectorAll('.js-plotly-plot,.plotly-graph-div').forEach(function(el){
      try { window.Plotly.Plots.resize(el); } catch(e) {}
    });
  }
  window.addEventListener('load', function(){ setTimeout(resizePlots, 250); setTimeout(resizePlots, 1000); });
  window.addEventListener('resize', function(){ setTimeout(resizePlots, 150); });
  window.addEventListener('orientationchange', function(){ setTimeout(resizePlots, 500); });
})();
</script>
