<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><title>CHECK visual</title><style>body{font-family:Arial;margin:20px}.ok{color:green}.bad{color:red}.box{height:180px;background:linear-gradient(rgba(0,40,90,.35),rgba(0,40,90,.6)),url('assets/img/hero_kc390_cabw.png') center/cover no-repeat;color:#fff;padding:20px}</style></head><body><h1>CHECK visual CABW</h1><div class="box">Se esta caixa tiver aeronave ao fundo, assets/img/hero_kc390_cabw.png está acessível.</div><h2>Arquivos locais</h2><ul id="out"></ul><script>const files=['css/style.css','assets/img/hero_kc390_cabw.png','assets/icons/home-credit.png','assets/icons/home-contract.png','assets/icons/home-process.png','index.html','credito.html','contratos.html','processos.html','requisicoes.html','governanca.html'];Promise.all(files.map(f=>fetch(f,{cache:'no-store'}).then(r=>[f,r.ok,r.status]).catch(e=>[f,false,e.message]))).then(rows=>{out.innerHTML=rows.map(r=>`<li class="${r[1]?'ok':'bad'}">${r[0]} - ${r[1]?'OK':'FALHA'} (${r[2]})</li>`).join('')})</script></body></html>
