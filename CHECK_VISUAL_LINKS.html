<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><title>CHECK visual</title><style>body{font-family:Arial;margin:20px}.ok{color:green}.bad{color:red}.box{height:180px;background:linear-gradient(rgba(0,40,90,.35),rgba(0,40,90,.6)),url('assets/img/hero_kc390_cabw.png') center/cover no-repeat;color:#fff;padding:20px}

/* Correção do dropdown multiseleção: janela compacta e checkboxes proporcionais */
.cabw-multi-dropdown{position:relative;width:100%;max-width:100%;font-family:inherit;}
.cabw-multi-menu{box-sizing:border-box;width:100%;min-width:100%;max-width:min(520px, calc(100vw - 32px));max-height:260px;overflow-y:auto;overflow-x:hidden;background:#fff;border:1px solid #ccd6e6;border-radius:12px;box-shadow:0 14px 32px rgba(0,31,85,.18);padding:6px;}
.cabw-multi-option{display:flex!important;align-items:flex-start!important;gap:8px!important;padding:7px 8px!important;border-radius:8px!important;margin:0!important;color:#001f55!important;font-size:13px!important;line-height:1.25!important;cursor:pointer!important;}
.detail-field .cabw-multi-option input[type="checkbox"],
.contracts-field .cabw-multi-option input[type="checkbox"],
.cabw-multi-option input[type="checkbox"]{
  appearance:auto!important;
  -webkit-appearance:checkbox!important;
  width:18px!important;
  min-width:18px!important;
  max-width:18px!important;
  height:18px!important;
  min-height:18px!important;
  max-height:18px!important;
  padding:0!important;
  margin:1px 7px 0 0!important;
  border:1px solid #8fa2bd!important;
  border-radius:3px!important;
  background:#fff!important;
  box-shadow:none!important;
  flex:0 0 18px!important;
  transform:none!important;
  accent-color:#003b7a!important;
}
.cabw-multi-option span{display:block;min-width:0;white-space:normal;overflow-wrap:anywhere;word-break:normal;}
.cabw-multi-actions{display:flex;justify-content:space-between;gap:8px;border-bottom:1px solid #e7edf6;margin-bottom:4px;padding:4px 4px 8px;position:sticky;top:0;background:#fff;z-index:1;}
.cabw-multi-actions button{min-height:28px!important;width:auto!important;min-width:0!important;border:0;border-radius:8px;background:#e9eef6;color:#003b7a;font-weight:700;padding:5px 10px;font-size:12px;cursor:pointer;}

</style></head><body><h1>CHECK visual CABW</h1><div class="box">Se esta caixa tiver aeronave ao fundo, assets/img/hero_kc390_cabw.png está acessível.</div><h2>Arquivos locais</h2><ul id="out"></ul><script>const files=['css/style.css','assets/img/hero_kc390_cabw.png','assets/icons/home-credit.png','assets/icons/home-contract.png','assets/icons/home-process.png','index.html','credito.html','contratos.html','processos.html','requisicoes.html','governanca.html'];Promise.all(files.map(f=>fetch(f,{cache:'no-store'}).then(r=>[f,r.ok,r.status]).catch(e=>[f,false,e.message]))).then(rows=>{out.innerHTML=rows.map(r=>`<li class="${r[1]?'ok':'bad'}">${r[0]} - ${r[1]?'OK':'FALHA'} (${r[2]})</li>`).join('')})</script></body></html>
