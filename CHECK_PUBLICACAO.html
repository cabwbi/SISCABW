<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Check CABW</title><link rel="stylesheet" href="css/style.css"><style>body{font-family:Arial;padding:24px}.ok{color:green}.bad{color:red}code{background:#eee;padding:2px 4px}

/* Correção do dropdown multiseleção: janela compacta e checkboxes proporcionais */
.cabw-multi-dropdown{position:relative;width:100%;max-width:100%;font-family:inherit;}
.cabw-multi-menu{box-sizing:border-box;width:100%;min-width:100%;max-width:min(520px, calc(100vw - 32px));max-height:260px;overflow-y:auto;overflow-x:hidden;background:#fff;border:1px solid #ccd6e6;border-radius:12px;box-shadow:0 14px 32px rgba(0,31,85,.18);padding:6px;}
.cabw-multi-option{display:flex!important;align-items:flex-start!important;gap:8px!important;padding:7px 8px!important;border-radius:8px!important;margin:0!important;color:#001f55!important;font-size:13px!important;line-height:1.25!important;cursor:pointer!important;}
.detail-field .cabw-multi-option input[type="checkbox"],
.contracts-field .cabw-multi-option input[type="checkbox"],
.cabw-multi-option input[type="checkbox"]{
  appearance:auto!important;
  -webkit-appearance:checkbox!important;
  width:18px!important;
  min-width:18px!important;
  max-width:18px!important;
  height:18px!important;
  min-height:18px!important;
  max-height:18px!important;
  padding:0!important;
  margin:1px 7px 0 0!important;
  border:1px solid #8fa2bd!important;
  border-radius:3px!important;
  background:#fff!important;
  box-shadow:none!important;
  flex:0 0 18px!important;
  transform:none!important;
  accent-color:#003b7a!important;
}
.cabw-multi-option span{display:block;min-width:0;white-space:normal;overflow-wrap:anywhere;word-break:normal;}
.cabw-multi-actions{display:flex;justify-content:space-between;gap:8px;border-bottom:1px solid #e7edf6;margin-bottom:4px;padding:4px 4px 8px;position:sticky;top:0;background:#fff;z-index:1;}
.cabw-multi-actions button{min-height:28px!important;width:auto!important;min-width:0!important;border:0;border-radius:8px;background:#e9eef6;color:#003b7a;font-weight:700;padding:5px 10px;font-size:12px;cursor:pointer;}



/* ===== Ajustes CABW: logo, filtros sem seleção inicial e área de relatórios ===== */
.navbar, .cabw-navbar { padding-right: 96px !important; }
.navbar-collapse { padding-right: 88px !important; }
.navbar-nav { flex-wrap: wrap !important; }
.header-logo, .cabw-header-logo { width: 54px !important; top: 18px !important; right: 18px !important; z-index: 2 !important; opacity: .96; }
@media (max-width: 1200px){ .header-logo, .cabw-header-logo{ display:none !important; } .navbar, .cabw-navbar{ padding-right: 32px !important; } .navbar-collapse{ padding-right:0 !important; } }
.cabw-filter-report-layout { display:grid !important; grid-template-columns:minmax(0,1fr) minmax(280px,340px); gap:24px; align-items:stretch; }
.cabw-filter-report-layout > .detail-workbench__panel { min-width:0; }
.cabw-report-panel { background:#fff; border-radius:18px; box-shadow:0 18px 34px rgba(2,27,70,.10); padding:24px; border:1px solid rgba(0,31,85,.07); display:flex; flex-direction:column; justify-content:space-between; gap:16px; }
.cabw-report-panel__icon { width:46px; height:46px; border-radius:14px; display:inline-flex; align-items:center; justify-content:center; background:#eef3fa; color:#003b7a; font-size:22px; }
.cabw-report-panel h2 { margin:0; color:#00265f; font-size:1.45rem; font-weight:800; }
.cabw-report-panel p { margin:0; color:#263a59; line-height:1.45; text-align:justify; }
.cabw-report-button { border:0; border-radius:12px; background:#ffd200; color:#00265f; font-weight:800; padding:12px 16px; box-shadow:0 8px 20px rgba(0,31,85,.15); cursor:pointer; }
.cabw-report-button:hover { filter:brightness(.96); transform:translateY(-1px); }
.contracts-workbench { display:grid !important; grid-template-columns:minmax(0,1fr) minmax(280px,340px); gap:24px; align-items:start; }
.contracts-workbench .contracts-filter-header, .contracts-workbench .contracts-filter-grid { grid-column:1; }
.contracts-workbench .cabw-report-panel { grid-column:2; grid-row:1 / span 2; height:100%; }
@media (max-width: 992px){ .cabw-filter-report-layout, .contracts-workbench { grid-template-columns:1fr !important; } .contracts-workbench .cabw-report-panel { grid-column:1; grid-row:auto; } }
</style></head><body><h1>Verificação de publicação</h1><p>Esta página verifica se os caminhos usados pelo site estão acessíveis.</p><ul id="out"></ul><script>
const files=['css/style.css','assets/img/hero_aircraft_clean.png
assets/img/hero_kc390_cabw.png','assets/img/hero_eagle.png','assets/icons/home-credit.png','assets/icons/home-contract.png','assets/icons/home-process.png','cabw_logo.png'];
const out=document.getElementById('out');
Promise.all(files.map(async f=>{try{const r=await fetch(f,{cache:'no-store'}); out.insertAdjacentHTML('beforeend',`<li class="${r.ok?'ok':'bad'}"><code>${f}</code> ${r.status} ${r.ok?'OK':'FALHOU'}</li>`)}catch(e){out.insertAdjacentHTML('beforeend',`<li class="bad"><code>${f}</code> erro: ${e}</li>`)}}));
</script></body></html>
