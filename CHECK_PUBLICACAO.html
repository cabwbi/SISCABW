</head><body><h1>Verificação de publicação</h1><p>Esta página verifica se os caminhos usados pelo site estão acessíveis.</p><ul id="out"></ul><script>
const files=['css/style.css','assets/img/hero_aircraft_clean.png
assets/img/hero_kc390_cabw.png','assets/img/hero_eagle.png','assets/icons/home-credit.png','assets/icons/home-contract.png','assets/icons/home-process.png','cabw_logo.png'];
const out=document.getElementById('out');
Promise.all(files.map(async f=>{try{const r=await fetch(f,{cache:'no-store'}); out.insertAdjacentHTML('beforeend',`<li class="${r.ok?'ok':'bad'}"><code>${f}</code> ${r.status} ${r.ok?'OK':'FALHOU'}</li>`)}catch(e){out.insertAdjacentHTML('beforeend',`<li class="bad"><code>${f}</code> erro: ${e}</li>`)}}));
</script>
<script id="cabw-mobile-responsive-js">
(function(){
  function resizePlots(){
    if(!window.Plotly) return;
    document.querySelectorAll('.js-plotly-plot').forEach(function(gd){
      try{
        var w = gd.clientWidth || gd.parentElement && gd.parentElement.clientWidth || window.innerWidth;
        var isMobile = window.matchMedia('(max-width: 640px)').matches;
        var update = {autosize:true};
        if(isMobile){ update.margin = {l: Math.min(96, Math.max(46, Math.round(w*0.22))), r: 12, t: 54, b: 46}; }
        Plotly.relayout(gd, update);
        Plotly.Plots.resize(gd);
      }catch(e){}
    });
  }
  function normalizeTables(){
    document.querySelectorAll('table').forEach(function(tbl){
      if(tbl.closest('.cabw-table-scroll,.table-responsive')) return;
      var parent = tbl.parentElement;
      if(!parent || parent.classList.contains('cabw-table-scroll')) return;
      if(parent.matches('section, article, div, main')){
        var wrap = document.createElement('div');
        wrap.className = 'cabw-table-scroll';
        parent.insertBefore(wrap, tbl);
        wrap.appendChild(tbl);
      }
    });
  }
  function syncDropdownBounds(){
    document.querySelectorAll('.cabw-multi-menu').forEach(function(menu){
      menu.style.maxWidth = Math.max(280, window.innerWidth - 32) + 'px';
    });
  }
  window.addEventListener('load', function(){ normalizeTables(); syncDropdownBounds(); setTimeout(resizePlots, 250); setTimeout(resizePlots, 900); });
  window.addEventListener('resize', function(){ syncDropdownBounds(); clearTimeout(window.__cabwResizeTimer); window.__cabwResizeTimer=setTimeout(resizePlots,160); });
  window.addEventListener('orientationchange', function(){ setTimeout(resizePlots, 350); });
  document.addEventListener('click', function(){ setTimeout(function(){ syncDropdownBounds(); resizePlots(); }, 80); }, true);
})();
</script>
